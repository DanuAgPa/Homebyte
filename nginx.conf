upstream nextjs_upstream {
    # Resolve the internal Docker Compose DNS name for the Next.js service
    # The load balancer will automatically distribute traffic across all replicas
    server nextjs-app:3000;
}

server {
    listen 80;
    server_name localhost;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/css application/javascript image/svg+xml;

    location /_next/static/ {
        # Using proxy instead of alias since static files are baked into the standalone image
        # You could also mount a shared volume and use 'alias' for even faster static serving
        proxy_pass http://nextjs_upstream;
        proxy_cache_bypass $http_upgrade;
        expires 365d;
        access_log off;
    }

    location / {
        proxy_pass http://nextjs_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Additional headers for tracking IP addresses
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
